material_inventory_totals.api_get_item:
  path: '/api/v1/inventory/item/{nid}'
  defaults:
    _controller: '\Drupal\material_inventory_totals\Controller\InventoryApiController::getItem'
    _format: json
  requirements:
    _permission: 'update material inventory counts'
    nid: \d+
  methods: [GET]
  options:
    _auth:
      - oauth2

material_inventory_totals.api_submit_count:
  path: '/api/v1/inventory/count'
  defaults:
    _controller: '\Drupal\material_inventory_totals\Controller\InventoryApiController::submitCount'
    _format: json
  requirements:
    _permission: 'update material inventory counts'
  methods: [POST]
  options:
    _auth:
      - oauth2

material_inventory_totals.inventory_count:
  path: '/admin/material/{node}/inventory-count'
  defaults:
    _form: '\Drupal\material_inventory_totals\Form\InventoryCountForm'
    _title: 'Update Inventory Count'
  requirements:
    _permission: 'update material inventory counts'
    _entity_access: 'node.update'
    _custom_access: '\Drupal\material_inventory_totals\Form\InventoryCountForm::access'
    node: \d+
  options:
    parameters:
      node:
        type: 'entity:node'
